<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#13131c"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="20%" stop-color="#fbbf24"/>
      <stop offset="40%" stop-color="#34d399"/>
      <stop offset="60%" stop-color="#38bdf8"/>
      <stop offset="80%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(168,85,247,0.25)"/>
      <stop offset="100%" stop-color="rgba(168,85,247,0)"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="280" fill="url(#glow)"/>
  <circle cx="300" cy="500" r="280" fill="url(#glow)"/>

  <!-- Prism -->
  <g transform="translate(180,180)">
    <polygon points="135,40 250,260 20,260" fill="url(#face)" stroke="url(#edge)" stroke-width="2.5"/>
    <line x1="135" y1="40" x2="135" y2="260" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  </g>

  <!-- Text -->
  <text x="500" y="265" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="700" fill="#f5f5f7" letter-spacing="-3">Prism</text>
  <text x="500" y="335" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="500" fill="url(#title)">Refract any thought into clarity.</text>
  <text x="500" y="395" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#8e8e93">Ten lenses. One engine. Powered by MiMo V2.5 Pro.</text>

  <!-- Lens dots -->
  <g transform="translate(500,470)">
    <circle cx="0" cy="0" r="6" fill="#f87171"/>
    <circle cx="30" cy="0" r="6" fill="#fbbf24"/>
    <circle cx="60" cy="0" r="6" fill="#34d399"/>
    <circle cx="90" cy="0" r="6" fill="#38bdf8"/>
    <circle cx="120" cy="0" r="6" fill="#a78bfa"/>
    <circle cx="150" cy="0" r="6" fill="#f472b6"/>
  </g>
</svg>
